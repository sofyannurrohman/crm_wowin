name: wowin_crm
description: Wowin CRM Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & DI
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  get_it: ^7.6.7 # Optional DI to replace riverpod's provider behavior
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP
  dio: ^5.4.0
  
  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  
  # Database lokal
  sqflite: ^2.3.0
  
  # Kamera & foto
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  
  # GPS & Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0
  permission_handler: ^11.3.0
  workmanager: ^0.5.2
  
  # Utils
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  intl: ^0.19.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
